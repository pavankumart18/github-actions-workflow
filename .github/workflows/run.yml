name: repo-observer

on:
  issues:
  pull_request:
  push:
  issue_comment:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install requests
        run: pip install requests

      - name: Run observer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python runner.py